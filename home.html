<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Forge Automation</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* Design preserved exactly as you had it */
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#e63946;--red-glow:rgba(230,57,70,0.5);--bg:#04060a;--bg2:#080d14;--text:#eaecf4;--fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);overflow-x:hidden;}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;}
.hero h1{font-family:var(--fh);font-size:clamp(2rem,8vw,4rem);line-height:1.1;}
.hero h1 span{display:block;}
.hero h1 .red{color:var(--red);text-shadow:0 0 30px var(--red-glow);}
.chat-toggle{position:fixed;bottom:2rem;right:2rem;width:60px;height:60px;background:var(--red);border:none;border-radius:50%;cursor:pointer;font-size:24px;z-index:1000;}
.chat-window{position:fixed;bottom:6rem;right:2rem;width:350px;background:var(--bg2);border:1px solid var(--red);display:none;flex-direction:column;height:450px;z-index:999;box-shadow:0 10px 50px rgba(0,0,0,0.8);}
.chat-window.open{display:flex;}
.chat-header{background:var(--red);padding:15px;font-family:var(--fh);font-size:0.7rem;display:flex;justify-content:space-between;}
.chat-messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px;}
.msg{padding:10px;border-radius:5px;font-size:0.9rem;max-width:85%;}
.msg.bot{background:#1a1a1a;align-self:flex-start;border-left:3px solid var(--red);}
.msg.user{background:var(--red);align-self:flex-end;}
.chat-input-row{padding:10px;display:flex;gap:5px;background:#000;}
.chat-input{flex:1;background:#222;border:1px solid #444;color:#fff;padding:8px;outline:none;}
.chat-send{background:var(--red);border:none;padding:0 15px;color:#fff;cursor:pointer;}
</style>
</head>
<body>

<section class="hero">
  <div>
    <h1><span>AUTOMATE.</span><span class="red">DOMINATE.</span><span>SCALE.</span></h1>
    <p style="margin-top:20px; color:#888;">AI Forge Automation is live.</p>
  </div>
</section>

<button class="chat-toggle" onclick="toggleChat()">💬</button>

<div class="chat-window" id="chatWindow">
  <div class="chat-header">FORGE AI ASSISTANT <span onclick="toggleChat()" style="cursor:pointer">✕</span></div>
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">Hello! I am Forge AI. I'm connected and ready to help. How can I assist you?</div>
  </div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()">SEND</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* THE KEYS ARE ALREADY PLUGGED IN FOR YOU */
const SB_URL = "https://nzkwyvilfzbevbgsgxht.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56a3d5dmlsZnpiZXZiZ3NneGh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTQwODg0NjAsImV4cCI6MjAyOTY2NDQ2MH0.Uu0-XnOC5fsQCLJXT_rIdcyf8JA_8sv7Q";
const GROQ_KEY = "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";

const supabase = window.supabase.createClient(SB_URL, SB_KEY);

function toggleChat(){ document.getElementById('chatWindow').classList.toggle('open'); }

async function sendChat(){
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if(!msg) return;
    
    addMsg(msg, 'user');
    input.value = '';
    
    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "llama3-8b-8192",
                messages: [{role: "system", content: "You are Forge AI. Be professional."}, {role: "user", content: msg}]
            })
        });
        
        const data = await response.json();
        const reply = data.choices[0].message.content;
        addMsg(reply, 'bot');
        
        // This sends the data to your Supabase table
        await supabase.from('messages').insert([{ content: msg, role: 'user' }, { content: reply, role: 'assistant' }]);
    } catch (err) {
        addMsg("Connection issue. Try refreshing the page.", 'bot');
    }
}

function addMsg(text, role){
    const chatBox = document.getElementById('chatMessages');
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerText = text;
    chatBox.appendChild(el);
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>
</body>
</html>
