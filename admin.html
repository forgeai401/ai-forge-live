<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Forge — Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e63946;--red2:#ff2d3a;--red-glow:rgba(230,57,70,0.5);--red-dim:rgba(230,57,70,0.1);
  --bg:#04060a;--bg2:#080d14;--bg3:#0d1320;--bg4:#121929;
  --text:#eaecf4;--text2:#7a8299;--border:rgba(230,57,70,0.15);--border2:rgba(230,57,70,0.3);
  --fh:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:16px;line-height:1.6;min-height:100vh;}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
.login-box{background:var(--bg2);border:1px solid var(--border2);padding:2.5rem;width:100%;max-width:400px;}
.login-box h1{font-family:var(--fh);font-size:1rem;letter-spacing:3px;margin-bottom:.5rem;color:#fff;}
.login-box p{color:var(--text2);font-size:.85rem;margin-bottom:1.5rem;}
.login-box .error{color:var(--red);font-size:.85rem;margin-bottom:1rem;display:none;}
.form-field{margin-bottom:1rem;}
.form-field label{display:block;font-size:.6rem;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;font-family:var(--fh);margin-bottom:6px;}
.form-field input{width:100%;background:rgba(255,255,255,0.02);border:1px solid var(--border);color:var(--text);padding:12px 15px;font-family:var(--fb);font-size:.93rem;outline:none;transition:all .25s;}
.form-field input:focus{border-color:var(--red);background:rgba(230,57,70,0.04);}
.login-btn{width:100%;background:var(--red);color:#fff;border:none;padding:14px;font-family:var(--fh);font-size:.68rem;letter-spacing:2.5px;cursor:pointer;transition:all .25s;text-transform:uppercase;}
.login-btn:hover{box-shadow:0 0 35px var(--red-glow);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}

/* DASHBOARD */
.dashboard{display:none;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-logo{font-family:var(--fh);font-size:.75rem;letter-spacing:2px;color:#fff;}
.topbar-logo .ai{color:var(--red);}
.topbar-badge{font-size:.55rem;letter-spacing:2px;color:var(--red);border:1px solid var(--border2);padding:3px 10px;font-family:var(--fh);}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.topbar-email{color:var(--text2);font-size:.8rem;}
.logout-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 18px;font-family:var(--fh);font-size:.58rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.main{max-width:1200px;margin:0 auto;padding:2rem 5%;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem;}
.stat-card{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);}
.stat-num{font-family:var(--fh);font-size:2rem;font-weight:700;color:var(--red);text-shadow:0 0 20px var(--red-glow);}
.stat-label{font-size:.6rem;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;font-family:var(--fh);margin-top:4px;}

/* TABS */
.tabs{display:flex;border:1px solid var(--border2);width:fit-content;margin-bottom:1.5rem;}
.tab{background:transparent;border:none;color:var(--text2);padding:11px 28px;font-family:var(--fh);font-size:.6rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
.tab.active{background:var(--red);color:#fff;}

/* TABLE */
.table-wrap{background:var(--bg2);border:1px solid var(--border);overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg3);font-family:var(--fh);font-size:.58rem;letter-spacing:2px;color:var(--text2);text-transform:uppercase;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border2);white-space:nowrap;}
td{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:.88rem;color:var(--text2);vertical-align:top;}
tr:hover td{background:rgba(230,57,70,0.03);}
td.email-col{color:var(--text);font-weight:500;}
td .tag{display:inline-block;background:var(--red-dim);border:1px solid var(--border2);color:var(--red);font-size:.65rem;padding:2px 8px;font-family:var(--fh);letter-spacing:1px;}
.empty-state{text-align:center;padding:3rem;color:var(--text2);font-size:.9rem;}
.refresh-btn{background:transparent;border:1px solid var(--border2);color:var(--text2);padding:7px 18px;font-family:var(--fh);font-size:.58rem;letter-spacing:2px;cursor:pointer;transition:all .2s;text-transform:uppercase;margin-left:1rem;}
.refresh-btn:hover{border-color:var(--red);color:var(--red);}

@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .topbar-email{display:none;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <h1><span class="ai">AI</span> FORGE ADMIN</h1>
    <p>Sign in to access the dashboard</p>
    <div class="error" id="loginError"></div>
    <div class="form-field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="admin@example.com">
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Your password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo"><span class="ai">AI</span> FORGE</div>
      <div class="topbar-badge">Admin</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-email" id="adminEmail"></span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-num" id="statContacts">—</div><div class="stat-label">Contact Submissions</div></div>
      <div class="stat-card"><div class="stat-num" id="statChats">—</div><div class="stat-label">Chat Sessions</div></div>
      <div class="stat-card"><div class="stat-num" id="statMessages">—</div><div class="stat-label">Chat Messages</div></div>
      <div class="stat-card"><div class="stat-num" id="statToday">—</div><div class="stat-label">Today's Contacts</div></div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1rem;">
      <div class="tabs">
        <button class="tab active" onclick="switchView('contacts',this)">Contact Forms</button>
        <button class="tab" onclick="switchView('chats',this)">Chat Logs</button>
      </div>
      <button class="refresh-btn" onclick="refreshData()">Refresh</button>
    </div>

    <div id="contactsView">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Name</th><th>Email</th><th>Business</th><th>Service</th><th>Message</th></tr></thead>
          <tbody id="contactsBody"></tbody>
        </table>
      </div>
    </div>

    <div id="chatsView" style="display:none;">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Session</th><th>Role</th><th>Message</th></tr></thead>
          <tbody id="chatsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ybmddenbvrryttvslwvk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlibWRkZW5idnJyeXR0dnNsd3ZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTE2MDIsImV4cCI6MjA5MjYyNzYwMn0.Znz8jQfaJM-1zRkzNfsuVVBW_qq0CtkC9WoV8mSF4x4';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Check session on load
supabase.auth.getSession().then(({data:{session}})=>{
  if(session) showDashboard(session);
});

supabase.auth.onAuthStateChange((event,session)=>{
  if(event==='SIGNED_IN' && session) showDashboard(session);
  if(event==='SIGNED_OUT') hideDashboard();
});

async function handleLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const errEl=document.getElementById('loginError');
  const btn=document.getElementById('loginBtn');
  errEl.style.display='none';

  if(!email||!password){errEl.textContent='Enter email and password';errEl.style.display='block';return;}

  btn.disabled=true;btn.textContent='Signing in...';
  const {error}=await supabase.auth.signInWithPassword({email,password});
  if(error){errEl.textContent=error.message;errEl.style.display='block';btn.disabled=false;btn.textContent='Sign In';}
}

async function handleLogout(){
  await supabase.auth.signOut();
}

function showDashboard(session){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('adminEmail').textContent=session.user.email;
  refreshData();
}

function hideDashboard(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('dashboard').style.display='none';
}

function switchView(view,btn){
  document.getElementById('contactsView').style.display=view==='contacts'?'block':'none';
  document.getElementById('chatsView').style.display=view==='chats'?'block':'none';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

async function refreshData(){
  const [contacts,chats,chatSessions,todayContacts]=await Promise.all([
    supabase.from('contact_submissions').select('*').order('created_at',{ascending:false}).limit(100),
    supabase.from('chat_conversations').select('*').order('created_at',{ascending:false}).limit(200),
    supabase.from('chat_conversations').select('session_id'),
    supabase.from('contact_submissions').select('id',{count:'exact'}).gte('created_at',new Date().toISOString().slice(0,10))
  ]);

  document.getElementById('statContacts').textContent=contacts.count??contacts.data?.length??'0';
  const uniqueSessions=new Set((chatSessions.data||[]).map(r=>r.session_id));
  document.getElementById('statChats').textContent=uniqueSessions.size;
  document.getElementById('statMessages').textContent=chats.data?.length??'0';
  document.getElementById('statToday').textContent=todayContacts.count??'0';

  // Contacts table
  const cBody=document.getElementById('contactsBody');
  if(!contacts.data||contacts.data.length===0){
    cBody.innerHTML='<tr><td colspan="6" class="empty-state">No contact submissions yet</td></tr>';
  } else {
    cBody.innerHTML=contacts.data.map(r=>`<tr>
      <td>${formatDate(r.created_at)}</td>
      <td class="email-col">${esc(r.name)}</td>
      <td class="email-col">${esc(r.email)}</td>
      <td>${esc(r.business_type)}</td>
      <td><span class="tag">${esc(r.service_interest||'N/A')}</span></td>
      <td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.message)}">${esc(r.message)}</td>
    </tr>`).join('');
  }

  // Chats table
  const chBody=document.getElementById('chatsBody');
  if(!chats.data||chats.data.length===0){
    chBody.innerHTML='<tr><td colspan="4" class="empty-state">No chat messages yet</td></tr>';
  } else {
    chBody.innerHTML=chats.data.map(r=>`<tr>
      <td>${formatDate(r.created_at)}</td>
      <td style="font-family:monospace;font-size:.75rem;color:var(--text2);">${esc(r.session_id.slice(0,16))}...</td>
      <td><span class="tag">${r.role}</span></td>
      <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(r.content)}">${esc(r.content)}</td>
    </tr>`).join('');
  }
}

function formatDate(iso){
  if(!iso)return '';
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

function esc(s){
  if(!s)return '';
  const d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

// Enter key on login
document.getElementById('loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin();});
</script>
</body>
</html>
